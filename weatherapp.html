<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
 <link rel="stylesheet" href="style.css">
<body>
    <div class="container">
        <div class="search">
            <input type="text" id="city" spellcheck="false" placeholder="enter city name">
            <button  id="btn"><img src="images/search.png"></button>

        </div>
        <div class="weather">
            <img src="images/question-mark.png" class="weather-icon">
             <p class="status"></p>
            <h1 class="temp">0°C</h1>
            <h2 class="city">city</h2>
           
            
            <div class="details">
                <div class="col">
                <img src="images/cloud (1).png">
                <p class="humidity"></p>
                <p>Humidity</p>
                </div>
                <div class="col">
                <img src="images/wind (2).png">
                <p class="wind"></p>
                <p>Wind</p>
                </div>
                </div>
            </div>
           
        </div>
       
    </div>
    <script src="script.js"></script>
</body>

</html>
